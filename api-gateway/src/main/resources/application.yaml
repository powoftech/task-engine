server:
    port: 8080

spring:
    application:
        name: api-gateway

    # PostgreSQL Database Configuration
    datasource:
        url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:task_engine}
        username: ${DB_USER:green_user}
        password: ${DB_PASSWORD:green_password}
        driver-class-name: org.postgresql.Driver
        hikari:
            pool-name: HikariCP
            maximum-pool-size: 10 # Architectural constraint: Protect DB from overload
            minimum-idle: 2
            connection-timeout: 30000 # 30 seconds
            idle-timeout: 600000 # 10 minutes
            max-lifetime: 1800000 # 30 minutes
            register-mbeans: true

    # JPA / Hibernate Configuration
    jpa:
        hibernate:
            ddl-auto: validate # We manage schema via init.sql / migrations, NOT Hibernate
        show-sql: false
        properties:
            hibernate:
                type:
                    "[json_format_mapper]": com.greennode.api_gateway.utilities.CustomHibernateJsonFormatter

management:
    opentelemetry:
        tracing:
            export:
                otlp:
                    endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
    tracing:
        sampling:
            probability: 1.0 # Sample all requests for tracing
    logging:
        export:
            otlp:
                enabled: false # Disable OTLP logging export to avoid performance overhead
    otlp:
        metrics:
            export:
                enabled: false # Disable OTLP metrics export to avoid performance overhead
