server:
  port: 8080

spring:
  application:
    name: api-gateway

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:task_engine}
    username: ${DB_USER:green_user}
    password: ${DB_PASSWORD:green_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: HikariCP
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000 # 30 seconds
      idle-timeout: 600000 # 10 minutes
      max-lifetime: 1800000 # 30 minutes
      register-mbeans: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        type:
          "[json_format_mapper]": com.greennode.api_gateway.utilities.CustomHibernateJsonFormatter

management:
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
  tracing:
    sampling:
      probability: 1.0 # Sample all requests for tracing
  logging:
    export:
      otlp:
        enabled: false
  otlp:
    metrics:
      export:
        enabled: false
