# PostgreSQL Configuration for Debezium CDC
# This configuration enables logical replication required for Change Data Capture

# Listen on all IP addresses (Required for Docker networking)
listen_addresses = '*'

# Write-Ahead Log (WAL) Configuration
# wal_level = logical enables logical decoding which Debezium needs to capture changes
wal_level = logical

# Maximum number of concurrent WAL sender processes
# Debezium creates a replication connection, so we need at least 1
# Setting to 4 allows for multiple CDC connections if needed in the future
max_wal_senders = 4

# Maximum number of replication slots
# Each Debezium connector creates one replication slot
# Setting to 4 allows for multiple connectors if needed
max_replication_slots = 4

# Optional: Limit WAL retention to prevent disk space exhaustion
# Uncomment and adjust based on your disk space and recovery requirements
max_slot_wal_keep_size = 1GB

