services:
  postgres:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_USER: green_user
      POSTGRES_PASSWORD: green_password
      POSTGRES_DB: task_engine
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db-init/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./infra/db-init/postgresql.conf:/etc/postgresql/postgresql.conf
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h localhost -p 5432 -U green_user -d task_engine || exit 1" ]
    networks:
      - task_network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4.2-management-alpine
    ports:
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: green_user
      RABBITMQ_DEFAULT_PASS: green_password
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: -rabbitmq_management load_definitions "/etc/rabbitmq/definitions.json"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infra/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json
    healthcheck:
      test: [ "CMD-SHELL", "rabbitmq-diagnostics -q ping || exit 1" ]
    networks:
      - task_network
    restart: unless-stopped

  debezium:
    image: quay.io/debezium/server:3.4
    volumes:
      - debezium_data:/debezium/data
      - ./infra/debezium/application.properties:/debezium/config/application.properties
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/q/health || exit 1" ]
    networks:
      - task_network
    restart: unless-stopped

  redis:
    image: redis:8.6-alpine
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli ping || exit 1" ]
    networks:
      - task_network
    restart: unless-stopped

  jaeger:
    # image: jaegertracing/jaeger:latest
    build:
      context: ./infra/jaeger
      dockerfile: Dockerfile
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:13133/status || exit 1" ]
    networks:
      - task_network
    restart: unless-stopped

  worker-node:
    build:
      context: ./worker-node
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: green_user
      DB_PASSWORD: green_password
      DB_NAME: task_engine
      MQ_HOST: rabbitmq
      MQ_PORT: 5672
      MQ_USER: green_user
      MQ_PASSWORD: green_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
    networks:
      - task_network
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: green_user
      DB_PASSWORD: green_password
      DB_NAME: task_engine
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://jaeger:4318/v1/traces
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    networks:
      - task_network
    restart: unless-stopped

volumes:
  postgres_data:
  rabbitmq_data:
  debezium_data:


networks:
  task_network:
    driver: bridge
